<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07111e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
<title>BCT-CHOP</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07111e;
  --surface: #0d1b2a;
  --surface2: #091522;
  --border: rgba(255,255,255,0.07);
  --text: #ddd8d0;
  --muted: rgba(221,216,208,0.4);
  --primary: #1a3aff;
  --g: 5px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Public Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: calc(var(--safe-top) + 4px) var(--g) calc(var(--safe-bot) + 4px);
  -webkit-user-select: none;
  user-select: none;
  overflow-y: auto;
}

/* ── BCT Navigation Header ── */
.bct-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px 6px;
  flex-shrink: 0;
  width: 100%;
  max-width: 580px;
}
.bct-back {
  font-family: 'Public Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--primary);
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.bct-reel-logo { display: flex; align-items: center; gap: 4px; }
.bct-reel-c {
  width: 11px; height: 11px;
  border: 1.5px solid var(--primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.bct-reel-c::after {
  content: '';
  width: 3px; height: 3px;
  background: var(--primary);
  border-radius: 50%;
}
.bct-reel-bar { width: 8px; height: 1.5px; background: var(--primary); }

.machine {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 580px;
  gap: 7px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: clamp(16px, 4.5vw, 24px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 3px;
}
.logo-sub {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 0.12em;
  display: block;
  margin-top: 2px;
  text-transform: uppercase;
}
.rec-controls { display: flex; gap: 5px; align-items: center; }

.btn {
  font-family: 'Public Sans', sans-serif;
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.btn-rec {
  background: var(--surface2);
  border-color: var(--border);
  color: var(--muted);
  padding: 6px 11px;
  user-select: none;
}
.btn-rec.recording {
  background: #d03020;
  color: #fff;
  border-color: #b02010;
  animation: blink 0.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.65} }

.upload-label {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  padding: 6px 11px;
  font-family: 'Public Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  cursor: pointer;
  touch-action: manipulation;
}
.upload-label input { display: none; }

/* ── Waveform ── */
.wave-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
#waveCanvas {
  width: 100%;
  height: 88px;
  border-radius: 4px;
  display: block;
  cursor: crosshair;
  touch-action: none;
  -webkit-touch-callout: none;
}
.wave-footer {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.wave-hint-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.wave-hint {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.03em;
  flex: 1;
  min-width: 0;
}
.wave-info {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.03em;
  flex-shrink: 0;
}
.wave-btns {
  display: flex;
  gap: 6px;
}
.btn-chop {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  padding: 9px 20px;
  font-size: 11px;
  min-height: 40px;
  flex: 1;
}
.btn-chop:disabled {
  background: var(--surface);
  border-color: var(--border);
  color: var(--muted);
  cursor: not-allowed;
}
.btn-prev {
  background: rgba(26,58,255,0.12);
  border-color: rgba(26,58,255,0.3);
  color: var(--text);
  padding: 9px 16px;
  font-size: 11px;
  min-height: 40px;
  flex: 1;
}
.btn-prev.playing { background: #c04030; border-color: #a02818; color: #fff; }
.btn-prev:disabled { background: var(--surface); border-color: var(--border); color: var(--muted); cursor: not-allowed; }

/* ── Pad grid ── */
.pad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 5px;
  flex-shrink: 0;
}
.pad {
  aspect-ratio: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: filter 0.06s, transform 0.06s;
}
.pad.filled {
  border-color: rgba(255,255,255,0.14);
}
.pad.active {
  filter: brightness(1.35);
  transform: scale(0.94);
}
.pad-num {
  font-size: 8px;
  position: absolute;
  top: 4px;
  left: 5px;
  color: rgba(255,255,255,0.38);
  font-weight: 500;
}
.pad-name {
  font-size: clamp(8px, 2.2vw, 11px);
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  text-align: center;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  padding: 2px 3px;
  line-height: 1.2;
  word-break: break-all;
}
.pad-empty-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}
@media (hover: hover) {
  .pad:hover { filter: brightness(1.1); }
  .pad.filled:hover { filter: brightness(1.15); }
}

/* ── Loop section ── */
.loop-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.section-lbl {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--muted);
  flex-shrink: 0;
  text-transform: uppercase;
}
.loop-btns {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
.loop-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  padding: 5px 3px;
  font-family: 'Public Sans', sans-serif;
  font-size: clamp(7px, 1.9vw, 9px);
  font-weight: 500;
  letter-spacing: 0.03em;
  cursor: pointer;
  touch-action: manipulation;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.loop-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.loop-controls {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.btn-play {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  padding: 6px 13px;
  font-size: 11px;
  flex-shrink: 0;
}
.btn-play.playing {
  background: #c04030;
  border-color: #c04030;
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 5px;
  flex: 1;
  min-width: 0;
}
.lbl {
  font-size: 8px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 0.12em;
  flex-shrink: 0;
  text-transform: uppercase;
}
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(to right, var(--primary) var(--pct,50%), rgba(255,255,255,0.1) var(--pct,50%));
  outline: none;
  cursor: pointer;
  min-width: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
}
.bpm-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 26px;
  text-align: right;
  cursor: ns-resize;
  touch-action: none;
  border-bottom: 1px dashed rgba(221,216,208,0.2);
  padding-bottom: 1px;
  flex-shrink: 0;
}
.vol-row {
  display: flex;
  align-items: center;
  gap: 5px;
  flex: 1;
  min-width: 100px;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--surface);
  border: 1px solid rgba(26,58,255,0.3);
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  max-width: 280px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 0 40px rgba(26,58,255,0.1), 0 20px 60px rgba(0,0,0,0.7);
}
.modal-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary);
  letter-spacing: 0.15em;
  text-align: center;
  text-transform: uppercase;
}
.modal-input {
  font-family: 'Public Sans', sans-serif;
  font-size: 13px;
  padding: 7px 9px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  width: 100%;
  -webkit-user-select: text;
  user-select: text;
}
.modal-btns { display: flex; gap: 6px; }
.btn-rename { background: var(--primary); border-color: var(--primary); color: #fff; flex:1; padding: 7px; border-radius: 5px; font-size: 10px; border: none; cursor: pointer; }
.btn-delete { background: #c03020; border-color: #a02010; color: #fff; flex:1; padding: 7px; border-radius: 5px; font-size: 10px; border: none; cursor: pointer; }
.btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); flex:1; padding: 7px; border-radius: 5px; font-size: 10px; cursor: pointer; }

.pitch-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 8px;
}
.pitch-display {
  flex: 1;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: 0.05em;
}
.btn-pitch {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  width: 34px;
  height: 34px;
  font-size: 18px;
  border-radius: 5px;
  flex-shrink: 0;
  line-height: 1;
  cursor: pointer;
}

/* ── Pad keyboard key label ── */
.pad-key {
  position: absolute;
  bottom: 3px;
  right: 5px;
  font-size: 7px;
  font-weight: 500;
  color: rgba(255,255,255,0.28);
  pointer-events: none;
  letter-spacing: 0;
  line-height: 1;
}
.pad.filled .pad-key { color: rgba(255,255,255,0.22); }

/* ── Mixer ── */
.mixer {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mix-track {
  display: flex;
  align-items: center;
  gap: 7px;
}
.vu-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.vu-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, #1a3aff 0%, #3a5aff 70%, #60aaff 100%);
  border-radius: 3px;
  will-change: width;
}
.vu-fill.peak { background: linear-gradient(to right, #1a3aff 0%, #ff4030 100%); }
.track-lbl {
  font-size: 8px;
  letter-spacing: 0.15em;
  color: var(--muted);
  flex-shrink: 0;
  width: 30px;
  text-transform: uppercase;
}
.mute-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-family: 'Public Sans', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.1em;
  cursor: pointer;
  padding: 3px 7px;
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.08s;
}
.mute-btn.muted {
  background: rgba(200,50,40,0.25);
  border-color: rgba(200,50,40,0.5);
  color: #ff6050;
}
.mix-rec-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.btn-mixrec {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 14px;
  font-size: 10px;
  flex-shrink: 0;
  transition: all 0.1s;
  border-radius: 5px;
  font-weight: 500;
  letter-spacing: 0.1em;
}
.btn-mixrec.recording {
  background: rgba(200,40,30,0.18);
  border-color: rgba(200,40,30,0.45);
  color: #ff5040;
  animation: blink 0.9s ease-in-out infinite;
}
.rec-timer {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.08em;
  min-width: 42px;
}
.rec-timer.active { color: #ff5040; }
.btn-wav {
  margin-left: auto;
  background: var(--primary);
  border: 1px solid var(--primary);
  color: #fff;
  padding: 7px 16px;
  font-size: 10px;
  font-family: 'Public Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-decoration: none;
  border-radius: 5px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  transition: opacity 0.1s;
  flex-shrink: 0;
}
.btn-wav:hover { opacity: 0.85; }
.btn-wav.hidden { display: none; }
</style>
</head>
<body>
<header class="bct-nav">
  <a class="bct-back" href="https://bluechordtape-hub.vercel.app">← BLUE CHORD TAPE</a>
  <div class="bct-reel-logo">
    <div class="bct-reel-c"></div>
    <div class="bct-reel-bar"></div>
    <div class="bct-reel-c"></div>
  </div>
</header>
<div class="machine">

  <!-- Header -->
  <div class="header">
    <div>
      <span class="logo">BCT-CHOP</span>
      <span class="logo-sub">SAMPLE CHOPPER</span>
    </div>
    <div class="rec-controls">
      <button id="recBtn" class="btn btn-rec">● REC</button>
      <label class="upload-label">↑ LOAD<input type="file" id="fileIn" accept="audio/*"></label>
    </div>
  </div>

  <!-- Waveform -->
  <div class="wave-section">
    <canvas id="waveCanvas"></canvas>
    <div class="wave-footer">
      <div class="wave-hint-row">
        <span class="wave-hint" id="waveHint">REC 또는 파일 업로드 후 드래그로 구간 선택</span>
        <span class="wave-info" id="waveInfo"></span>
      </div>
      <div class="wave-btns">
        <button id="prevBtn" class="btn btn-prev" disabled>▶ PRE</button>
        <button id="chopBtn" class="btn btn-chop" disabled>CHOP</button>
      </div>
    </div>
  </div>

  <!-- 4×4 Pad grid -->
  <div class="pad-grid" id="padGrid"></div>

  <!-- Drum loop section -->
  <div class="loop-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1px">
      <span class="section-lbl">DRUM LOOP</span>
    </div>
    <div class="loop-btns" id="loopBtns"></div>
    <div class="loop-controls">
      <button id="playBtn" class="btn btn-play">▶ PLAY</button>
      <div class="ctrl-row">
        <span class="lbl">BPM</span>
        <input type="range" id="bpmSlider" min="60" max="180" value="90" step="1">
        <span class="bpm-val" id="bpmVal">90</span>
      </div>
    </div>
    <!-- 2-Track Mixer -->
    <div class="mixer">
      <div class="mix-track">
        <span class="track-lbl">LOOP</span>
        <div class="vu-bar"><div class="vu-fill" id="vuLoop"></div></div>
        <input type="range" id="loopVolSlider" min="0" max="100" value="70" style="flex:1;min-width:0">
        <button class="mute-btn" id="loopMute">M</button>
      </div>
      <div class="mix-track">
        <span class="track-lbl">SMPL</span>
        <div class="vu-bar"><div class="vu-fill" id="vuSmpl"></div></div>
        <input type="range" id="smplVolSlider" min="0" max="100" value="80" style="flex:1;min-width:0">
        <button class="mute-btn" id="smplMute">M</button>
      </div>
      <div class="mix-rec-row">
        <button class="btn btn-mixrec" id="mixRecBtn">⬤ REC MIX</button>
        <span class="rec-timer" id="mixTimer">00:00</span>
        <a class="btn-wav hidden" id="mixDlBtn" download="bct-mix.wav">↓ WAV</a>
      </div>
    </div>
  </div>

</div>

<!-- Long-press pad modal -->
<div class="modal-overlay hidden" id="padModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">PAD 1</div>
    <input type="text" class="modal-input" id="renameInput" placeholder="새 이름 입력">
    <div class="pitch-row">
      <span class="lbl">PITCH</span>
      <button class="btn btn-pitch" id="pitchDown">−</button>
      <span class="pitch-display" id="pitchDisplay">±0 st</span>
      <button class="btn btn-pitch" id="pitchUp">+</button>
    </div>
    <div class="modal-btns">
      <button class="btn btn-rename" id="renameBtn">OK</button>
      <button class="btn btn-delete" id="deleteBtn">DELETE</button>
      <button class="btn btn-cancel" id="cancelBtn">CANCEL</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Audio Context ─────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null, masterOut = null, loopGainNode = null, smplGainNode = null;
let loopAnalyser = null, smplAnalyser = null, streamDest = null;

function boot() {
  if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
  ctx = new AC();
  masterOut    = ctx.createGain(); masterOut.gain.value = 1;
  loopGainNode = ctx.createGain(); loopGainNode.gain.value = +loopVolSlider.value / 100;
  smplGainNode = ctx.createGain(); smplGainNode.gain.value = +smplVolSlider.value / 100;

  // Analysers for VU meters
  loopAnalyser = ctx.createAnalyser(); loopAnalyser.fftSize = 512; loopAnalyser.smoothingTimeConstant = 0.5;
  smplAnalyser = ctx.createAnalyser(); smplAnalyser.fftSize = 512; smplAnalyser.smoothingTimeConstant = 0.5;

  loopGainNode.connect(loopAnalyser); loopAnalyser.connect(masterOut);
  smplGainNode.connect(smplAnalyser); smplAnalyser.connect(masterOut);

  // Stream destination for Mix Recorder
  streamDest = ctx.createMediaStreamDestination();
  masterOut.connect(streamDest);
  masterOut.connect(ctx.destination);
}

function decodeAudio(ab) {
  return new Promise((res, rej) => ctx.decodeAudioData(ab, res, rej));
}

// ─── Pad data ──────────────────────────────────────────────────────────────────
const PAD_COLORS = [
  '#e87040','#5080d0','#50b080','#d0a020','#d05080','#8060c0',
  '#40a0b0','#c06030','#60a848','#d06880','#4070c0','#b06040',
  '#8068c0','#c08840','#3898a0','#a85068'
];

const pads = Array.from({length:16}, () => ({buf: null, name: '', color: '', pitch: 0}));
const activeSrc = new Array(16).fill(null);

// ─── Build Pad DOM ─────────────────────────────────────────────────────────────
const padGrid = document.getElementById('padGrid');

const PAD_KEYS = ['1','2','3','4','Q','W','E','R','A','S','D','F','Z','X','C','V'];

function buildPads() {
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'pad';
    el.dataset.i = i;
    el.innerHTML = `<span class="pad-num">${i+1}</span><span class="pad-name"></span><span class="pad-key">${PAD_KEYS[i]}</span>`;
    padGrid.appendChild(el);
  }
}

function refreshPad(i) {
  const el = padGrid.children[i];
  const p  = pads[i];
  el.classList.toggle('filled', !!p.buf);
  el.style.background = p.buf ? p.color : '';
  el.style.borderColor = '';
  const nameEl = el.querySelector('.pad-name');
  const pitchTag = p.pitch ? ` ${p.pitch > 0 ? '+' : ''}${p.pitch}` : '';
  nameEl.textContent = p.buf ? ((p.name || `S${i+1}`) + pitchTag) : '';
  let dot = el.querySelector('.pad-empty-dot');
  if (!p.buf) {
    if (!dot) { dot = document.createElement('div'); dot.className = 'pad-empty-dot'; el.appendChild(dot); }
  } else {
    if (dot) dot.remove();
  }
}

function playPad(i) {
  const p = pads[i];
  if (!p.buf || !ctx) return;
  // Mute group: stop all currently playing pads
  for (let j = 0; j < 16; j++) {
    if (activeSrc[j]) {
      try { activeSrc[j].stop(); } catch(e) {}
      activeSrc[j] = null;
      padGrid.children[j].classList.remove('active');
    }
  }
  const src = ctx.createBufferSource();
  src.buffer = p.buf;
  src.playbackRate.value = Math.pow(2, (p.pitch || 0) / 12);
  src.connect(smplGainNode);
  src.start();
  activeSrc[i] = src;
  const el = padGrid.children[i];
  el.classList.add('active');
  src.onended = () => { el.classList.remove('active'); if (activeSrc[i] === src) activeSrc[i] = null; };
}

// ─── Pad events (tap + long-press) ────────────────────────────────────────────
const LONG_MS = 500;
let lpTimer = null, lpIdx = -1, lpStart = null;
let modalIdx = -1;

padGrid.addEventListener('pointerdown', e => {
  const el = e.target.closest('.pad');
  if (!el) return;
  e.preventDefault();
  const i = +el.dataset.i;
  lpIdx   = i;
  lpStart = {x: e.clientX, y: e.clientY};
  lpTimer = setTimeout(() => {
    lpTimer = null;
    openPadModal(i);
    lpIdx = -1; lpStart = null;
  }, LONG_MS);
}, {passive: false});

padGrid.addEventListener('pointermove', e => {
  if (!lpTimer || !lpStart) return;
  const dx = e.clientX - lpStart.x, dy = e.clientY - lpStart.y;
  if (dx*dx + dy*dy > 64) { clearTimeout(lpTimer); lpTimer = null; lpIdx = -1; lpStart = null; }
}, {passive: true});

padGrid.addEventListener('pointerup', e => {
  if (lpTimer) {
    clearTimeout(lpTimer); lpTimer = null;
    const i = lpIdx; lpIdx = -1; lpStart = null;
    if (i < 0) return;
    boot();
    playPad(i);
  } else { lpIdx = -1; lpStart = null; }
}, {passive: true});

padGrid.addEventListener('pointercancel', () => {
  clearTimeout(lpTimer); lpTimer = null; lpIdx = -1; lpStart = null;
}, {passive: true});

// ─── Pad modal ─────────────────────────────────────────────────────────────────
const padModal   = document.getElementById('padModal');
const modalTitle = document.getElementById('modalTitle');
const renameInput = document.getElementById('renameInput');

const pitchDisplay = document.getElementById('pitchDisplay');

function fmtPitch(st) { return st === 0 ? '±0 st' : (st > 0 ? `+${st} st` : `${st} st`); }

function openPadModal(i) {
  if (!pads[i].buf) return;
  modalIdx = i;
  modalTitle.textContent = `── PAD ${i+1} ──`;
  renameInput.value = pads[i].name || `S${i+1}`;
  pitchDisplay.textContent = fmtPitch(pads[i].pitch || 0);
  padModal.classList.remove('hidden');
  setTimeout(() => renameInput.focus(), 80);
}

function closePadModal() { padModal.classList.add('hidden'); modalIdx = -1; }

document.getElementById('renameBtn').addEventListener('click', () => {
  if (modalIdx < 0) return;
  const v = renameInput.value.trim();
  if (v) pads[modalIdx].name = v;
  refreshPad(modalIdx);
  closePadModal();
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  if (modalIdx < 0) return;
  if (activeSrc[modalIdx]) { try { activeSrc[modalIdx].stop(); } catch(e){} activeSrc[modalIdx] = null; }
  pads[modalIdx] = {buf: null, name: '', color: '', pitch: 0};
  refreshPad(modalIdx);
  closePadModal();
});

document.getElementById('cancelBtn').addEventListener('click', closePadModal);
padModal.addEventListener('click', e => { if (e.target === padModal) closePadModal(); });

// Pitch controls
document.getElementById('pitchDown').addEventListener('click', () => {
  if (modalIdx < 0) return;
  pads[modalIdx].pitch = Math.max(-24, (pads[modalIdx].pitch || 0) - 1);
  pitchDisplay.textContent = fmtPitch(pads[modalIdx].pitch);
  refreshPad(modalIdx);
});
document.getElementById('pitchUp').addEventListener('click', () => {
  if (modalIdx < 0) return;
  pads[modalIdx].pitch = Math.min(24, (pads[modalIdx].pitch || 0) + 1);
  pitchDisplay.textContent = fmtPitch(pads[modalIdx].pitch);
  refreshPad(modalIdx);
});

// ─── Waveform Canvas ───────────────────────────────────────────────────────────
const canvas  = document.getElementById('waveCanvas');
const ctx2    = canvas.getContext('2d');
const waveHint = document.getElementById('waveHint');
const waveInfo = document.getElementById('waveInfo');
const chopBtn  = document.getElementById('chopBtn');

let waveBuffer = null;
let selA = -1, selB = -1;     // selection: 0..1 of full buffer
let viewStart = 0, viewEnd = 1; // visible window: 0..1 of full buffer
let isDragging = false;

// Pinch zoom state
const activePointers = new Map();
let pinchStartDist = 0, pinchStartView = null, pinchCenterRatio = 0;

function bufToCanvas(ratio, W) {
  return (ratio - viewStart) / (viewEnd - viewStart) * W;
}
function canvasToBuf(px, W) {
  return viewStart + (px / W) * (viewEnd - viewStart);
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawWave();
}

function drawWave() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx2.clearRect(0, 0, W, H);

  // Background
  ctx2.fillStyle = '#050d18';
  ctx2.beginPath();
  ctx2.roundRect(0, 0, W, H, 5);
  ctx2.fill();

  if (!waveBuffer) {
    ctx2.fillStyle = 'rgba(221,216,208,0.28)';
    ctx2.font = `500 11px "Public Sans"`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText('REC 또는 파일 업로드', W/2, H/2);
    return;
  }

  // Draw only the visible window (viewStart..viewEnd of buffer)
  const data = waveBuffer.getChannelData(0);
  const bufStart = Math.floor(viewStart * data.length);
  const bufEnd   = Math.ceil(viewEnd   * data.length);
  const visLen   = Math.max(1, bufEnd - bufStart);
  const spp      = visLen / W; // samples per pixel

  const mid = H / 2;
  ctx2.beginPath();
  ctx2.moveTo(0, mid);
  for (let x = 0; x < W; x++) {
    const s = Math.floor(bufStart + x * spp);
    const e = Math.min(data.length, Math.ceil(s + spp));
    let peak = 0;
    for (let j = s; j < e; j++) { const v = Math.abs(data[j]); if (v > peak) peak = v; }
    ctx2.lineTo(x, mid - peak * mid * 0.88);
  }
  for (let x = W - 1; x >= 0; x--) {
    const s = Math.floor(bufStart + x * spp);
    const e = Math.min(data.length, Math.ceil(s + spp));
    let peak = 0;
    for (let j = s; j < e; j++) { const v = Math.abs(data[j]); if (v > peak) peak = v; }
    ctx2.lineTo(x, mid + peak * mid * 0.88);
  }
  ctx2.closePath();
  const grad = ctx2.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#3050ff');
  grad.addColorStop(0.5, '#1a3aff');
  grad.addColorStop(1,   '#3050ff');
  ctx2.fillStyle = grad;
  ctx2.fill();

  // Center line
  ctx2.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx2.lineWidth = 0.5;
  ctx2.beginPath(); ctx2.moveTo(0, mid); ctx2.lineTo(W, mid); ctx2.stroke();

  // Selection overlay — map buffer coords → canvas pixels
  if (selA >= 0 && selB >= 0 && Math.abs(selB - selA) > 0.001) {
    const px1 = Math.max(0, Math.min(W, bufToCanvas(Math.min(selA, selB), W)));
    const px2 = Math.max(0, Math.min(W, bufToCanvas(Math.max(selA, selB), W)));
    if (px2 > px1) {
      ctx2.fillStyle = 'rgba(26,58,255,0.2)';
      ctx2.fillRect(px1, 0, px2 - px1, H);
      ctx2.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx2.lineWidth = 1.5;
      ctx2.beginPath();
      ctx2.moveTo(px1, 0); ctx2.lineTo(px1, H);
      ctx2.moveTo(px2, 0); ctx2.lineTo(px2, H);
      ctx2.stroke();
    }
  }

  // Zoom scrollbar — only shown when zoomed in
  if (viewStart > 0.001 || viewEnd < 0.999) {
    const bH = 4, bY = H - bH - 1;
    ctx2.fillStyle = 'rgba(255,255,255,0.06)';
    ctx2.fillRect(0, bY, W, bH);
    ctx2.fillStyle = 'rgba(26,58,255,0.65)';
    ctx2.fillRect(viewStart * W, bY, (viewEnd - viewStart) * W, bH);
  }
}

// Canvas: pinch-to-zoom (2 fingers) + drag selection (1 finger)
canvas.addEventListener('pointerdown', e => {
  if (!waveBuffer) return;
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  activePointers.set(e.pointerId, {x: e.clientX, y: e.clientY});

  if (activePointers.size === 1) {
    // Single finger — start selection drag
    isDragging = true;
    const buf = canvasToBuf(e.clientX - r.left, r.width);
    selA = Math.max(0, Math.min(1, buf));
    selB = selA;
    drawWave();
  } else if (activePointers.size === 2) {
    // Second finger — switch to pinch zoom, cancel selection drag
    isDragging = false;
    const pts = [...activePointers.values()];
    pinchStartDist   = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    pinchStartView   = {start: viewStart, end: viewEnd};
    const midX       = (pts[0].x + pts[1].x) / 2 - r.left;
    pinchCenterRatio = Math.max(0, Math.min(1, canvasToBuf(midX, r.width)));
  }
}, {passive: false});

canvas.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, {x: e.clientX, y: e.clientY});
  const r = canvas.getBoundingClientRect();

  if (activePointers.size >= 2 && pinchStartView) {
    // ── Pinch zoom ──
    const pts = [...activePointers.values()];
    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    if (dist < 1) return;

    const initLen = pinchStartView.end - pinchStartView.start;
    const newLen  = Math.min(1, Math.max(0.01, initLen * (pinchStartDist / dist)));

    // Keep pinchCenterRatio under the pinch midpoint
    const centerFrac = (pinchCenterRatio - pinchStartView.start) / initLen;
    let newStart = pinchCenterRatio - centerFrac * newLen;
    let newEnd   = newStart + newLen;

    if (newStart < 0) { newStart = 0; newEnd = newLen; }
    if (newEnd   > 1) { newEnd = 1;   newStart = Math.max(0, 1 - newLen); }

    viewStart = newStart;
    viewEnd   = newEnd;
    drawWave();
  } else if (isDragging && activePointers.size === 1) {
    // ── Drag selection ──
    selB = Math.max(0, Math.min(1, canvasToBuf(e.clientX - r.left, r.width)));
    drawWave();
  }
}, {passive: true});

canvas.addEventListener('pointerup', e => {
  activePointers.delete(e.pointerId);

  if (activePointers.size === 0) {
    // All fingers lifted
    pinchStartView = null;
    if (isDragging) {
      isDragging = false;
      const span = Math.abs(selB - selA);
      if (span > 0.001 && waveBuffer) {
        const dur = waveBuffer.duration * span;
        waveHint.textContent = `선택: ${dur.toFixed(2)}s (${(viewEnd-viewStart<0.999?'확대됨':'전체')}) → CHOP`;
        chopBtn.disabled = false; prevBtn.disabled = false;
      }
    }
  } else if (activePointers.size === 1) {
    // One finger remains — end pinch, don't start new selection yet
    pinchStartView = null;
    isDragging = false;
  }
}, {passive: true});

canvas.addEventListener('pointercancel', e => {
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0) { isDragging = false; pinchStartView = null; }
}, {passive: true});

// ─── Recording ────────────────────────────────────────────────────────────────
const recBtn = document.getElementById('recBtn');
let mediaRecorder = null, recChunks = [], isRecording = false;

function getMimeType() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'];
  return types.find(t => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || '';
}

recBtn.addEventListener('pointerdown', async e => {
  e.preventDefault();
  if (isRecording) return;
  boot();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true, video: false});
    recChunks = [];
    const mime = getMimeType();
    mediaRecorder = new MediaRecorder(stream, mime ? {mimeType: mime} : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recChunks, {type: mime || 'audio/webm'});
      const ab = await blob.arrayBuffer();
      try {
        waveBuffer = await decodeAudio(ab);
        selA = 0; selB = 1; viewStart = 0; viewEnd = 1;
        resizeCanvas();
        updateWaveInfo();
        chopBtn.disabled = false; prevBtn.disabled = false;
        waveHint.textContent = '드래그로 구간 선택 후 CHOP';
      } catch(err) { alert('오디오 디코딩 실패: ' + err.message); }
    };
    mediaRecorder.start(100);
    isRecording = true;
    recBtn.classList.add('recording');
    recBtn.textContent = '■ STOP';
  } catch(err) {
    alert('마이크 접근 불가: ' + (err.message || err));
  }
}, {passive: false});

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.stop();
  isRecording = false;
  recBtn.classList.remove('recording');
  recBtn.textContent = '● REC';
}

recBtn.addEventListener('pointerup',     stopRecording, {passive: true});
recBtn.addEventListener('pointercancel', stopRecording, {passive: true});

// ─── File Upload ───────────────────────────────────────────────────────────────
document.getElementById('fileIn').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  boot();
  const ab = await file.arrayBuffer();
  try {
    waveBuffer = await decodeAudio(ab);
    selA = 0; selB = 1;
    resizeCanvas();
    updateWaveInfo();
    chopBtn.disabled = false; prevBtn.disabled = false;
    waveHint.textContent = '드래그로 구간 선택 후 CHOP';
  } catch(err) { alert('파일 디코딩 실패: ' + err.message); }
  e.target.value = '';
});

function updateWaveInfo() {
  if (!waveBuffer) { waveInfo.textContent = ''; return; }
  waveInfo.textContent = `${waveBuffer.duration.toFixed(1)}s`;
}

// ─── Chop ──────────────────────────────────────────────────────────────────────
function sliceBuffer(buf, s, e) {
  const start = Math.floor(s * buf.length);
  const end   = Math.ceil(e  * buf.length);
  const len   = Math.max(1, end - start);
  const out   = ctx.createBuffer(buf.numberOfChannels, len, buf.sampleRate);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const src = new Float32Array(buf.getChannelData(ch).buffer, start * 4, len);
    out.copyToChannel(src, ch);
  }
  return out;
}

// ─── Preview selection ─────────────────────────────────────────────────────────
const prevBtn = document.getElementById('prevBtn');
let previewSrc = null;

function stopPreview() {
  if (previewSrc) { try { previewSrc.stop(); } catch(e){} previewSrc = null; }
  prevBtn.textContent = '▶ PRE';
  prevBtn.classList.remove('playing');
}

prevBtn.addEventListener('click', () => {
  if (previewSrc) { stopPreview(); return; }
  if (!waveBuffer || selA < 0) return;
  boot();
  const s = Math.min(selA, selB), e = Math.max(selA, selB);
  if (e - s < 0.001) return;
  const sliced = sliceBuffer(waveBuffer, s, e);
  const src = ctx.createBufferSource();
  src.buffer = sliced;
  src.connect(smplGainNode);
  src.start();
  previewSrc = src;
  prevBtn.textContent = '■ PRE';
  prevBtn.classList.add('playing');
  src.onended = stopPreview;
});

// ─── Chop ──────────────────────────────────────────────────────────────────────
chopBtn.addEventListener('click', () => {
  if (!waveBuffer || selA < 0) return;
  const s = Math.min(selA, selB), e = Math.max(selA, selB);
  if (e - s < 0.001) { alert('구간을 더 크게 선택하세요'); return; }
  boot();
  const sliced = sliceBuffer(waveBuffer, s, e);

  // Count assigned chops for naming
  const chopCount = pads.filter(p => p.buf).length + 1;
  const idx = pads.findIndex(p => !p.buf);
  if (idx === -1) { alert('패드가 꽉 찼습니다 (16/16)'); return; }

  pads[idx].buf   = sliced;
  pads[idx].name  = `C${chopCount}`;
  pads[idx].color = PAD_COLORS[idx % PAD_COLORS.length];
  pads[idx].pitch = 0;
  refreshPad(idx);

  // Flash the assigned pad
  const el = padGrid.children[idx];
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 180);

  waveHint.textContent = `PAD ${idx+1}에 할당됨 → 다시 선택하거나 CHOP 반복`;
});

// ─── Drum Loop Patterns ────────────────────────────────────────────────────────
// All hip-hop patterns, 80–100 BPM
// 16 steps = 1 bar of 16th notes
// Beat positions: 1=step0, 2=step4, 3=step8, 4=step12
const LOOPS = [
  // Classic Boom Bap: kick 1+3, snare 2+4, straight 8th hats

  // Pete Rock: syncopated kick on & of 2, extra hat at end
  {name:'Pete Rock',  bpm:88, k:'1000001010000000', s:'0000100000001000', h:'1010101010101110', o:'0000000000000010'},
  // Dilla Drunk: loose kick placement, sparse irregular hats — laid-back/drunk feel
  {name:'Dilla Drunk',bpm:82, k:'1001000010000001', s:'0000100000001001', h:'1010001010100010', o:'0000000000000100'},
  // Smooth Groove: rolling kicks on 1+&2+&3, soulful open hat
  {name:'Smooth Grv', bpm:86, k:'1000001000100000', s:'0000100000001000', h:'1010101010101010', o:'0000000100000000'},
  // East Coast: kick on 1+3+&3, aggressive 16th hat triplets
  {name:'East Coast', bpm:92, k:'1000000010100000', s:'0000100000001000', h:'1110111011101110', o:'0000000000000001'},
  // Laid Back: late kick on "a" of 2, ghost snare tail, sparse hats
  {name:'Laid Back',  bpm:84, k:'1000000110000000', s:'0000100000001001', h:'1010100010101001', o:'0000000000000010'},
  // Dark NY: kick 1+3+a3, 4-bar hat bursts (Mobb Deep style)
  {name:'Dark NY',    bpm:88, k:'1000000010010000', s:'0000100000001000', h:'1111000011110000', o:'0000000000000001'},
  // Soul Bounce: offbeat 8th hats, rolling kick, uptempo
  {name:'Soul Bounce',bpm:96, k:'1000001001000000', s:'0000100000001000', h:'0101010101010101', o:'0000000100000001'},
];

let currentLoop = 0, loopPlaying = false, loopStep = 0;
let nextNoteTime = 0, schedTimer = null;
let bpm = 90;

// ─── Build Loop Buttons ────────────────────────────────────────────────────────
const loopBtns = document.getElementById('loopBtns');

function buildLoopBtns() {
  LOOPS.forEach((lp, i) => {
    const btn = document.createElement('button');
    btn.className = 'loop-btn' + (i === 0 ? ' active' : '');
    btn.textContent = lp.name;
    btn.addEventListener('click', () => {
      currentLoop = i;
      loopStep = 0;
      bpm = lp.bpm;
      bpmSlider.value = bpm; bpmValEl.textContent = bpm;
      syncSlider(bpmSlider, 60, 180);
      document.querySelectorAll('.loop-btn').forEach((b, j) => b.classList.toggle('active', j === i));
    });
    loopBtns.appendChild(btn);
  });
}

// ─── Drum Synth ────────────────────────────────────────────────────────────────
function mkNoise(dur) {
  const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const s = ctx.createBufferSource(); s.buffer = buf;
  return s;
}

function playLoopDrum(type, when) {
  if (!ctx || !loopGainNode) return;
  const t = when;

  if (type === 'k') {
    const body  = ctx.createOscillator(); body.type = 'sine';
    const click = ctx.createOscillator(); click.type = 'triangle';
    body.frequency.setValueAtTime(160, t);
    body.frequency.exponentialRampToValueAtTime(40, t + 0.14);
    click.frequency.setValueAtTime(1400, t);
    click.frequency.exponentialRampToValueAtTime(60, t + 0.03);
    const bg = ctx.createGain(), cg = ctx.createGain();
    bg.gain.setValueAtTime(0.9, t); bg.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    cg.gain.setValueAtTime(0.35, t); cg.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    body.connect(bg); bg.connect(loopGainNode);
    click.connect(cg); cg.connect(loopGainNode);
    body.start(t); body.stop(t + 0.4);
    click.start(t); click.stop(t + 0.05);
  }

  if (type === 's') {
    const noise = mkNoise(0.22), body = ctx.createOscillator(); body.type = 'triangle';
    const bpf   = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 3200; bpf.Q.value = 0.55;
    body.frequency.setValueAtTime(260, t); body.frequency.exponentialRampToValueAtTime(100, t + 0.08);
    const eg = ctx.createGain(), bg = ctx.createGain();
    eg.gain.setValueAtTime(0.75, t); eg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    bg.gain.setValueAtTime(0.45, t); bg.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    noise.connect(bpf); bpf.connect(eg); eg.connect(loopGainNode);
    body.connect(bg); bg.connect(loopGainNode);
    noise.start(t); noise.stop(t + 0.22);
    body.start(t); body.stop(t + 0.1);
  }

  if (type === 'h') {
    const noise = mkNoise(0.07);
    const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 9500;
    const eg  = ctx.createGain();
    eg.gain.setValueAtTime(0.38, t); eg.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    noise.connect(hpf); hpf.connect(eg); eg.connect(loopGainNode);
    noise.start(t); noise.stop(t + 0.08);
  }

  if (type === 'o') {
    const noise = mkNoise(0.4);
    const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 7500;
    const eg  = ctx.createGain();
    eg.gain.setValueAtTime(0.45, t); eg.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    noise.connect(hpf); hpf.connect(eg); eg.connect(loopGainNode);
    noise.start(t); noise.stop(t + 0.4);
  }
}

// ─── Scheduler ────────────────────────────────────────────────────────────────
function scheduler() {
  while (nextNoteTime < ctx.currentTime + 0.12) {
    const step = loopStep % 16;
    const pat  = LOOPS[currentLoop];
    const sixteenth = 60 / bpm / 4;
    if (pat.k[step] === '1') playLoopDrum('k', nextNoteTime);
    if (pat.s[step] === '1') playLoopDrum('s', nextNoteTime);
    if (pat.h[step] === '1') playLoopDrum('h', nextNoteTime);
    if (pat.o[step] === '1') playLoopDrum('o', nextNoteTime);
    nextNoteTime += sixteenth;
    loopStep++;
  }
  schedTimer = setTimeout(scheduler, 22);
}

function startLoop() {
  boot();
  loopStep = 0;
  nextNoteTime = ctx.currentTime + 0.04;
  scheduler();
  loopPlaying = true;
  playBtn.textContent = '■ STOP';
  playBtn.classList.add('playing');
}

function stopLoop() {
  clearTimeout(schedTimer); schedTimer = null;
  loopPlaying = false;
  playBtn.textContent = '▶ PLAY';
  playBtn.classList.remove('playing');
}

const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', () => loopPlaying ? stopLoop() : startLoop());

// ─── Sliders ──────────────────────────────────────────────────────────────────
function syncSlider(el, min, max) {
  const pct = ((+el.value - min) / (max - min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

const bpmSlider    = document.getElementById('bpmSlider');
const bpmValEl     = document.getElementById('bpmVal');
const loopVolSlider = document.getElementById('loopVolSlider');
const smplVolSlider = document.getElementById('smplVolSlider');

bpmSlider.addEventListener('input', () => {
  bpm = +bpmSlider.value;
  bpmValEl.textContent = bpm;
  syncSlider(bpmSlider, 60, 180);
});
syncSlider(bpmSlider, 60, 180);

// BPM drag
let bpmDragY = null, bpmDragVal = 0;
bpmValEl.addEventListener('pointerdown', e => {
  e.preventDefault();
  bpmDragY   = e.clientY;
  bpmDragVal = bpm;
  bpmValEl.setPointerCapture(e.pointerId);
}, {passive: false});
bpmValEl.addEventListener('pointermove', e => {
  if (bpmDragY === null) return;
  bpm = Math.max(60, Math.min(180, bpmDragVal + Math.round((bpmDragY - e.clientY) / 2.5)));
  bpmSlider.value = bpm; bpmValEl.textContent = bpm;
  syncSlider(bpmSlider, 60, 180);
});
bpmValEl.addEventListener('pointerup',     () => { bpmDragY = null; });
bpmValEl.addEventListener('pointercancel', () => { bpmDragY = null; });
bpmValEl.addEventListener('wheel', e => {
  e.preventDefault();
  bpm = Math.max(60, Math.min(180, bpm + (e.deltaY < 0 ? 1 : -1)));
  bpmSlider.value = bpm; bpmValEl.textContent = bpm;
  syncSlider(bpmSlider, 60, 180);
}, {passive: false});

loopVolSlider.addEventListener('input', () => {
  if (loopGainNode) loopGainNode.gain.value = +loopVolSlider.value / 100;
  syncSlider(loopVolSlider, 0, 100);
});
syncSlider(loopVolSlider, 0, 100);

smplVolSlider.addEventListener('input', () => {
  if (smplGainNode) smplGainNode.gain.value = +smplVolSlider.value / 100;
  syncSlider(smplVolSlider, 0, 100);
});
syncSlider(smplVolSlider, 0, 100);

// ─── PWA + Silent Mode ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ctx && ctx.state === 'suspended') ctx.resume();
});
document.addEventListener('touchstart', () => {
  if (ctx && ctx.state === 'suspended') ctx.resume();
}, {once: true, passive: true});

// ─── Init ─────────────────────────────────────────────────────────────────────
buildPads();
buildLoopBtns();

// ─── Keyboard Shortcuts ────────────────────────────────────────────────────────
const KEY_TO_PAD = {
  '1':0,'2':1,'3':2,'4':3,
  'q':4,'w':5,'e':6,'r':7,
  'a':8,'s':9,'d':10,'f':11,
  'z':12,'x':13,'c':14,'v':15
};
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const idx = KEY_TO_PAD[e.key.toLowerCase()];
  if (idx === undefined) return;
  boot();
  playPad(idx);
});

// ─── VU Meters ─────────────────────────────────────────────────────────────────
const vuLoopEl = document.getElementById('vuLoop');
const vuSmplEl = document.getElementById('vuSmpl');
const _vuData  = new Float32Array(512);

function getLevel(analyser) {
  if (!analyser) return 0;
  analyser.getFloatTimeDomainData(_vuData);
  let peak = 0;
  for (let i = 0; i < analyser.fftSize; i++) {
    const a = Math.abs(_vuData[i]);
    if (a > peak) peak = a;
  }
  return Math.min(1, peak);
}

(function vuLoop() {
  const ll = getLevel(loopAnalyser) * 100;
  const sl = getLevel(smplAnalyser) * 100;
  vuLoopEl.style.width = ll + '%';
  vuSmplEl.style.width = sl + '%';
  vuLoopEl.classList.toggle('peak', ll > 90);
  vuSmplEl.classList.toggle('peak', sl > 90);
  requestAnimationFrame(vuLoop);
})();

let smplPreMuteVol = +smplVolSlider.value / 100;

});

// ─── WAV Encoder ───────────────────────────────────────────────────────────────
function audioBufferToWAV(ab) {
  const numCh = ab.numberOfChannels;
  const sr    = ab.sampleRate;
  const len   = ab.length;
  const pcm   = new Int16Array(len * numCh);

  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      const s = Math.max(-1, Math.min(1, ab.getChannelData(ch)[i]));
      pcm[i * numCh + ch] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
  }

  const wav = new ArrayBuffer(44 + pcm.byteLength);
  const v   = new DataView(wav);
  const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };

  str(0,  'RIFF');  v.setUint32(4,  36 + pcm.byteLength, true);
  str(8,  'WAVE');  str(12, 'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);             // PCM
  v.setUint16(22, numCh, true);
  v.setUint32(24, sr, true);
  v.setUint32(28, sr * numCh * 2, true);
  v.setUint16(32, numCh * 2, true);
  v.setUint16(34, 16, true);
  str(36, 'data'); v.setUint32(40, pcm.byteLength, true);

  new Int16Array(wav, 44).set(pcm);
  return wav;
}

// ─── Mix Recorder ──────────────────────────────────────────────────────────────
const mixRecBtn  = document.getElementById('mixRecBtn');
const mixTimerEl = document.getElementById('mixTimer');
const mixDlBtn   = document.getElementById('mixDlBtn');

let mixRecorder = null, mixChunks = [], mixRecording = false;
let mixTimerInterval = null, mixStartTime = 0;
let lastWavURL = null;

function getMixMime() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return types.find(t => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || '';
}

function startMixTimer() {
  mixStartTime = Date.now();
  mixTimerEl.classList.add('active');
  mixTimerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - mixStartTime) / 1000);
    mixTimerEl.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 500);
}

function stopMixTimer() {
  clearInterval(mixTimerInterval);
  mixTimerInterval = null;
  mixTimerEl.classList.remove('active');
}

mixRecBtn.addEventListener('click', async () => {
  if (!mixRecording) {
    // ── START ──
    boot();
    if (!streamDest) { alert('오디오 초기화 실패'); return; }

    mixDlBtn.classList.add('hidden');
    if (lastWavURL) { URL.revokeObjectURL(lastWavURL); lastWavURL = null; }

    mixChunks = [];
    const mime = getMixMime();
    try {
      mixRecorder = new MediaRecorder(streamDest.stream, mime ? {mimeType: mime} : {});
    } catch(e) {
      mixRecorder = new MediaRecorder(streamDest.stream);
    }

    mixRecorder.ondataavailable = e => { if (e.data.size > 0) mixChunks.push(e.data); };
    mixRecorder.onstop = async () => {
      stopMixTimer();
      mixRecBtn.textContent = '⬤ REC MIX';
      mixRecBtn.classList.remove('recording');

      const blob = new Blob(mixChunks, {type: mime || 'audio/webm'});
      const ab   = await blob.arrayBuffer();
      try {
        // Decode webm → PCM AudioBuffer → encode WAV
        const decoded = await new Promise((res, rej) => ctx.decodeAudioData(ab, res, rej));
        const wavBuf  = audioBufferToWAV(decoded);
        const wavBlob = new Blob([wavBuf], {type: 'audio/wav'});
        lastWavURL = URL.createObjectURL(wavBlob);
        mixDlBtn.href = lastWavURL;
        const dur = decoded.duration.toFixed(1);
        mixDlBtn.download = `bct-mix-${dur}s.wav`;
        mixDlBtn.classList.remove('hidden');
        mixTimerEl.textContent = `${decoded.duration.toFixed(1)}s`;
      } catch(err) {
        alert('WAV 변환 실패: ' + err.message);
      }
    };

    mixRecorder.start(100);
    mixRecording = true;
    mixRecBtn.textContent = '■ STOP';
    mixRecBtn.classList.add('recording');
    startMixTimer();

  } else {
    // ── STOP ──
    mixRecording = false;
    if (mixRecorder && mixRecorder.state !== 'inactive') mixRecorder.stop();
  }
});
